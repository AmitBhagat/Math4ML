<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Probability Visualizations - Fixed</title>

    <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
<!-- Include MathJax -->
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            width: 800px;
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #2c3e50;
            text-align: center;
        }

        .description {
            margin-bottom: 15px;
            color: #666;
            font-style: italic;
            text-align: center;
        }

        /* This is critical: The boards MUST have height and width in CSS */
        .board-div {
            width: 800px;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 0 auto;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>1. Central Limit Theorem</h2>
        <p class="description">Increase 'n' to see how the distribution converges to a Normal curve.</p>
        <div id="board-clt" class="board-div"></div>
    </div>

    <div class="container">
        <h2>2. Bayes' Theorem (Area Logic)</h2>
        <p class="description">Adjust Prior P(A) and Likelihood P(B|A) to see the Posterior shift.</p>
        <div id="board-bayes" class="board-div"></div>
    </div>

    <div class="container">
        <h2>3. Expectation & Variance</h2>
        <p class="description">Change Variance ($\sigma^2$) to see the "spread" around the Mean ($\mu$).</p>
        <div id="board-var" class="board-div"></div>
    </div>

    <script>
        // Wrap everything in an event listener to ensure the DOM is fully loaded
        window.addEventListener('DOMContentLoaded', (event) => {

            try {
                // --- 1. CENTRAL LIMIT THEOREM ---
                const boardCLT = JXG.JSXGraph.initBoard('board-clt', {
                    boundingbox: [-2, 12, 12, -2],
                    axis: true
                });

                const nSlider = boardCLT.create('slider', [[3, 11], [10, 11], [1, 20], [1, 0]]);
                const normalPDF = (x, mu, sigma) => {
                    return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
                };

                boardCLT.create('functiongraph', function (x) {
                    let n = nSlider.getValue();
                    let mu = 5;
                    let sigma = Math.sqrt(n) * 0.5;
                    let weight = (n - 1) / 19;
                    let uniform = (x >= 3 && x <= 7) ? 0.25 : 0;
                    let normal = normalPDF(x, mu, sigma * 0.5);
                    return (1 - weight) * uniform + weight * normal;
                }, true).setAttribute({ 'strokecolor': '#3498db', 'strokewidth': 3 });

                boardCLT.create('text', [1, 11.5, 'n = ']);
                boardCLT.create('text', [1.5, 11.5, () => nSlider.getValue()]);


                // --- 2. BAYES' THEOREM ---
                const boardBayes = JXG.JSXGraph.initBoard('board-bayes', {
                    boundingbox: [-1, 11, 11, -1],
                    axis: false
                });

                const pA = boardBayes.create('slider', [[2, 10], [5, 10], [0.5, 1], [0, 0]]);
                const pBgivenA = boardBayes.create('slider', [[2, 9], [5, 9], [0.7, 1], [0, 0]]);

                boardBayes.create('polygon', [[1, 1], [10, 1], [10, 8], [1, 8]], { fillcolor: '#ecf0f1', strokecolor: '#bdc3c7' });

                boardBayes.create('polygon', [
                    [1, 1], [() => 1 + 9 * pA.getValue(), 1],
                    [() => 1 + 9 * pA.getValue(), 8], [1, 8]
                ], { fillcolor: 'rgba(52, 152, 219, 0.3)', strokecolor: '#3498db' });

                boardBayes.create('polygon', [
                    [1, 1], [() => 1 + 9 * pA.getValue(), 1],
                    [() => 1 + 9 * pA.getValue(), () => 1 + 7 * pBgivenA.getValue()],
                    [1, () => 1 + 7 * pBgivenA.getValue()]
                ], { fillcolor: 'rgba(231, 76, 60, 0.6)', strokecolor: '#e74c3c' });

                boardBayes.create('text', [1, 10.5, 'Prior P(A)']);
                boardBayes.create('text', [1, 9.5, 'Likelihood P(B|A)']);
                boardBayes.create('text', [5, 4, () => `Posterior P(A|B) ∝ ${(pA.getValue() * pBgivenA.getValue()).toFixed(3)}`]);


                // --- 3. EXPECTATION & VARIANCE ---
                const boardVar = JXG.JSXGraph.initBoard('board-var', {
                    boundingbox: [-2, 10, 12, -2],
                    axis: true
                });

                const mu = 5;
                const sigmaSlider = boardVar.create('slider', [[3, 9], [7, 9], [1, 3], [0.2, 0]]);

                boardVar.create('functiongraph', function (x) {
                    let s = sigmaSlider.getValue();
                    return (1 / (s * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / s, 2));
                }, true).setAttribute({ 'strokecolor': '#2ecc71', 'strokewidth': 3 });

                boardVar.create('line', [[mu, 0], [mu, 5]], { strokecolor: '#c0392b', strokewidth: 2, dash: [4, 2] });

                const p1 = boardVar.create('point', [() => mu - sigmaSlider.getValue(), 0], { name: '', color: '#c0392b' });
                const p2 = boardVar.create('point', [() => mu + sigmaSlider.getValue(), 0], { name: '', color: '#c0392b' });
                boardVar.create('segment', [p1, p2], { strokecolor: '#c0392b', strokewidth: 2 });

                boardVar.create('text', [mu + 0.2, 5, 'E[X] = μ']);
                boardVar.create('text', [mu + 0.2, 4.5, () => `Var = ${sigmaSlider.getValue().toFixed(2)}`]);

            } catch (e) {
                console.error("JSXGraph Error: ", e);
                alert("An error occurred while loading JSXGraph. Check the console (F12).");
            }
        });
    </script>
</body>

</html>
